<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STADA – Снуп</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <a href="../index.html" class="logo" aria-label="STADA logo"><img src="../assets/logos/stada_logo.png" alt="STADA logo" /></a>
        <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <ul class="menu">
          <li><a href="../index.html#about" data-i18n-key="nav_about"></a></li>
          <li><a href="../index.html#news" data-i18n-key="nav_news"></a></li>
          <li><a href="index.html" data-i18n-key="nav_products"></a></li>
          <li><a href="../index.html#career" data-i18n-key="nav_career"></a></li>
        </ul>
        <div class="lang-toggle">
          <button class="lang-option" id="lang-ru" data-lang="ru" aria-label="Переключить язык на русский">RU</button>
          <button class="lang-option" id="lang-kz" data-lang="kz" aria-label="Переключить язык на казахский">KZ</button>
        </div>
      </div>
    </nav>
    <!-- Hero -->
    <section class="product-hero">
      <div class="product-hero-content">
        <div class="product-hero-text">
          <h1 data-i18n-key="product_snup_page_title"></h1>
          <p data-i18n-key="product_snup_page_desc"></p>
        </div>
        <div class="product-hero-image"><img src="../assets/products/Snup.png" alt="Snup" /></div>
      </div>
    </section>
    <!-- Benefits -->
    <section class="product-benefits">
      <h2 data-i18n-key="benefits_heading"></h2>
      <ul class="benefits-list">
        <li data-i18n-key="product_snup_benefit1"></li>
        <li data-i18n-key="product_snup_benefit2"></li>
        <li data-i18n-key="product_snup_benefit3"></li>
      </ul>
    </section>
    <!-- Where to buy -->
    <section class="product-where-to-buy">
      <h2 data-i18n-key="where_to_buy_heading"></h2>
      <div class="partners-grid">
        <div class="partner-card"><img src="../assets/logos/logo_kaspi.png" alt="KASPI" /><p>KASPI</p></div>
        <div class="partner-card"><img src="../assets/logos/logo_biosfera.png" alt="Биосфера" /><p>Биосфера</p></div>
        <div class="partner-card"><img src="../assets/logos/logo_europharma.png" alt="Europharma" /><p>Europharma</p></div>
        <div class="partner-card"><img src="../assets/logos/logo_dobraya.png" alt="Добрая" /><p>Добрая</p></div>
      </div>
    </section>
    <!-- Back link -->
    <div class="product-back" style="text-align:center; padding:2rem 0;"><a href="index.html" class="back-link" data-i18n-key="product_back"></a></div>
    <footer class="site-footer" id="site-footer">
      <div class="footer-container footer-modern">
<div class="footer-main">
          <div class="footer-brand">
            <a href="../index.html" class="footer-logo" aria-label="STADA logo">
              <img src="../assets/logos/stada_logo.png" alt="STADA logo" />
            </a>
            <p class="footer-eyebrow">STADA Kazakhstan</p>
            <p class="footer-text" data-i18n-key="footer_brand_text"></p>
            <div class="footer-trust" aria-label="STADA facts">
              <span data-i18n-key="footer_trust_years"></span>
              <span data-i18n-key="footer_trust_countries"></span>
            </div>
          </div>

          <nav class="footer-nav" aria-label="Footer navigation">
            <div class="footer-nav__group">
              <h3 data-i18n-key="footer_company_title"></h3>
              <a href="../index.html#about" data-i18n-key="nav_about"></a>
              <a href="../index.html#news" data-i18n-key="nav_news"></a>
              <a href="../index.html#career" data-i18n-key="nav_career"></a>
              <a href="https://www.stada.com" target="_blank" rel="noopener" data-i18n-key="footer_global_link"></a>
            </div>
            <div class="footer-nav__group">
              <h3 data-i18n-key="footer_products_title"></h3>
              <a href="index.html" data-i18n-key="products_browse_catalog"></a>
              <a href="coldrex.html" data-i18n-key="product_coldrex_name"></a>
              <a href="enterogermina.html" data-i18n-key="product_enterogermina_name"></a>
              <a href="vitrum-immunaktiv.html" data-i18n-key="product_vitrum_immunaktiv_name"></a>
            </div>
            <div class="footer-nav__group">
              <h3 data-i18n-key="footer_access_title"></h3>
              <a href="index.html#pharmacy-partners" data-i18n-key="where_to_buy_heading"></a>
              <a href="index.html#products-catalog" data-i18n-key="products_filter_all"></a>
              <a href="index.html#products-catalog" data-i18n-key="products_category_respiratory"></a>
              <a href="index.html#products-catalog" data-i18n-key="products_category_cardio"></a>
            </div>
          </nav>
        </div>

        <div class="footer-warning">
          <strong data-i18n-key="footer_warning_title"></strong>
          <p data-i18n-key="footer_warning_text"></p>
        </div>

        <div class="footer-bottom">
          <p>&copy; <span id="year"></span> STADA. <span data-i18n-key="footer_rights"></span></p>
          <div class="footer-bottom__links">
            <a href="https://www.stada.com" target="_blank" rel="noopener">stada.com</a>
            <a href="#" class="footer-top" data-i18n-key="footer_back_top" aria-label="Back to top"></a>
          </div>
        </div>
      </div>
    </footer>
    <script src="../js/script.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </body>
</html>
