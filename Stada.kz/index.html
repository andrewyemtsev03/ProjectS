<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STADA – О компании</title>
  <!-- Corporate font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <!-- Main stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation bar -->
  <nav>
    <div class="nav-container">
      <a href="#" class="logo" aria-label="STADA logo">
        <img src="assets/logos/stada_logo.png" alt="STADA logo">
      </a>
      <button class="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="menu">
        <li><a href="#about" data-i18n-key="nav_about"></a></li>
        <li><a href="history.html" data-i18n-key="nav_history"></a></li>
        <li><a href="#news" data-i18n-key="nav_news"></a></li>
        <li><a href="products/index.html" data-i18n-key="nav_products"></a></li>
        <li><a href="#career" data-i18n-key="nav_career"></a></li>
      </ul>
      <div class="lang-toggle">
        <button class="lang-option" id="lang-ru" data-lang="ru" aria-label="Переключить язык на русский">RU</button>
        <button class="lang-option" id="lang-kz" data-lang="kz" aria-label="Переключить язык на казахский">KZ</button>
      </div>
    </div>
  </nav>
  <!-- Hero section -->
  <header class="hero-section">
    <div class="hero-shell">
      <div class="hero-content">
        <p class="hero-eyebrow">STADA Kazakhstan</p>
        <h1 data-i18n-key="hero_title1"></h1>
        <p class="hero-lead" data-i18n-key="hero_sub1"></p>
      </div>
      <div class="hero-actions">
        <a href="#about" class="hero-btn" data-i18n-key="cta_more"></a>
        <a href="products/index.html" class="hero-btn hero-btn-secondary" data-i18n-key="nav_products"></a>
      </div>
      <div class="hero-metrics" aria-label="STADA facts">
        <div class="hero-metric">
          <strong data-hero-count="130" data-hero-suffix="+">0+</strong>
          <span data-i18n-key="hero_metric_years"></span>
        </div>
        <div class="hero-metric">
          <strong data-hero-count="100" data-hero-suffix="+">0+</strong>
          <span data-i18n-key="hero_metric_countries"></span>
        </div>
        <div class="hero-metric">
          <strong data-hero-count="11600" data-hero-suffix="+">0+</strong>
          <span data-i18n-key="hero_metric_employees"></span>
        </div>
      </div>
      <div class="hero-visual">
        <div class="hero-carousel" data-hero-carousel>
          <div class="hero-carousel-slide is-active" data-caption-key="hero_caption_office">
            <img src="assets/hero/carousel-office.png" alt="STADA Kazakhstan office building">
          </div>
          <div class="hero-carousel-slide hero-carousel-slide--awards" data-caption-key="hero_caption_awards">
            <span class="hero-awards-kicker">Recognition 2025</span>
            <img class="hero-awards-image" src="assets/hero/awards/esg-recognition-2025.png" alt="STADA ESG Recognition 2025: EcoVadis, Sustainalytics, Carbon Disclosure Project and Top Employer">
          </div>
          <div class="hero-carousel-slide" data-caption-key="hero_caption_logo">
            <img src="assets/hero/carousel-logo-wall.png" alt="STADA logo on a brick wall">
          </div>
          <div class="hero-carousel-dots" aria-label="Hero image navigation">
            <button class="hero-carousel-dot is-active" type="button" data-hero-slide="0" aria-label="Show hero image 1" aria-current="true"></button>
            <button class="hero-carousel-dot" type="button" data-hero-slide="1" aria-label="Show hero image 2"></button>
            <button class="hero-carousel-dot" type="button" data-hero-slide="2" aria-label="Show hero image 3"></button>
          </div>
        </div>
        <div class="hero-visual-caption" data-hero-caption data-i18n-key="hero_caption_office"></div>
      </div>
    </div>
  </header>

  <main class="home-main">
    <!-- About section -->
    <section class="about-section home-section" id="about">
      <div class="home-section__inner about-layout">
        <div class="about-copy">
          <p class="section-kicker">STADA Kazakhstan</p>
          <h2 data-i18n-key="about_heading"></h2>
          <div class="about-text">
            <p data-i18n-key="about_par1"></p>
            <p data-i18n-key="about_par2"></p>
          </div>
          <ul class="values-list about-values">
            <li><span class="value-icon">01</span><span data-i18n-key="about_list1"></span></li>
            <li><span class="value-icon">02</span><span data-i18n-key="about_list2"></span></li>
            <li><span class="value-icon">03</span><span data-i18n-key="about_list3"></span></li>
          </ul>
        </div>
        <div class="about-stats" aria-label="STADA facts">
          <div class="about-visual">
            <img src="assets/news/stada-headquarters-01.jpg" alt="STADA corporate headquarters in Bad Vilbel">
            <div class="about-visual__caption">
              <strong>STADA</strong>
              <span data-i18n-key="hero_caption_logo"></span>
            </div>
          </div>
          <div class="stats">
            <div class="stat"><span class="stat-number">01</span><span data-i18n-key="stats_sales"></span></div>
            <div class="stat"><span class="stat-number">02</span><span data-i18n-key="stats_employees"></span></div>
            <div class="stat"><span class="stat-number">03</span><span data-i18n-key="stats_countries"></span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- News section -->
    <section class="news-section home-section" id="news">
      <div class="home-section__inner">
        <div class="section-header">
          <div class="news-header-copy">
            <p class="section-kicker">STADA</p>
            <h2 data-i18n-key="nav_news"></h2>
            <p data-i18n-key="news_section_lead"></p>
          </div>
          <div class="news-carousel__controls" aria-label="News carousel controls">
            <button class="news-carousel__button" type="button" data-news-prev aria-label="Previous news">‹</button>
            <div class="news-carousel__status" aria-live="polite">
              <span data-news-current>01</span>
              <span>/</span>
              <span data-news-total>--</span>
            </div>
            <button class="news-carousel__button" type="button" data-news-next aria-label="Next news">›</button>
          </div>
        </div>
        <div class="news-carousel" data-news-carousel>
          <div class="news-track" data-news-track>
          <article class="news-card">
            <div class="news-card__media news-card__media--hq">
              <img src="assets/news/stada-headquarters-01.jpg" alt="STADA headquarters in Bad Vilbel">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">2025</span>
              <h3 data-i18n-key="hero_text1"></h3>
              <p data-i18n-key="news_1_text"></p>
            </div>
          </article>
          <article class="news-card">
            <div class="news-card__media news-card__media--hq">
              <img src="assets/news/stada-headquarters-02.jpg" alt="STADA headquarters complete view">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">2024</span>
              <h3 data-i18n-key="hero_text2"></h3>
              <p data-i18n-key="news_2_text"></p>
            </div>
          </article>
          <article class="news-card">
            <div class="news-card__media news-card__media--production">
              <img src="assets/news/stada-production-01.jpg" alt="STADA production specialist at equipment">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">KZ</span>
              <h3 data-i18n-key="hero_text3"></h3>
              <p data-i18n-key="news_3_text"></p>
            </div>
          </article>
          <article class="news-card">
            <div class="news-card__media news-card__media--lab-team">
              <img src="assets/news/stada-laboratory-01.jpg" alt="STADA laboratory team at work">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">2025</span>
              <h3 data-i18n-key="news_4_title"></h3>
              <p data-i18n-key="news_4_text"></p>
            </div>
          </article>
          <article class="news-card">
            <div class="news-card__media news-card__media--production">
              <img src="assets/news/stada-production-02.jpg" alt="STADA production process equipment">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">STADA</span>
              <h3 data-i18n-key="news_5_title"></h3>
              <p data-i18n-key="news_5_text"></p>
            </div>
          </article>
          <article class="news-card">
            <div class="news-card__media news-card__media--lab-detail">
              <img src="assets/news/stada-laboratory-02.jpg" alt="STADA laboratory glassware">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">Digestive</span>
              <h3 data-i18n-key="news_6_title"></h3>
              <p data-i18n-key="news_6_text"></p>
            </div>
          </article>
          <article class="news-card">
            <div class="news-card__media news-card__media--lab-detail">
              <img src="assets/news/stada-laboratory-03.jpg" alt="STADA laboratory equipment detail">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">Cold season</span>
              <h3 data-i18n-key="news_7_title"></h3>
              <p data-i18n-key="news_7_text"></p>
            </div>
          </article>
          <article class="news-card">
            <div class="news-card__media news-card__media--historic">
              <img src="assets/news/stada-historic-pharmacy.jpg" alt="Historic STADA pharmacy glass bottles">
            </div>
            <div class="news-card__body">
              <span class="news-card__date">Wellbeing</span>
              <h3 data-i18n-key="news_8_title"></h3>
              <p data-i18n-key="news_8_text"></p>
            </div>
          </article>
          </div>
          <div class="news-carousel__progress" aria-hidden="true">
            <span data-news-progress></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Career section -->
    <section class="career-section home-section" id="career">
      <div class="career-layout home-section__inner">
    <div class="career-media">
      <img src="assets/products/awards/top-employer-kazakhstan-2025.png" alt="Top Employer Kazakhstan 2025">
      <img src="assets/products/awards/top-employer-europe-2025.png" alt="Top Employer Europe 2025">
    </div>
    <div class="career-content">
      <p class="section-kicker" data-i18n-key="nav_career"></p>
      <h2 data-i18n-key="career_heading"></h2>
      <p data-i18n-key="career_par1"></p>
      <div class="career-facts">
        <div class="career-fact">
          <span class="number">&gt;50%</span>
          <span class="text" data-i18n-key="career_fact1"></span>
        </div>
        <div class="career-fact">
          <span class="number">94%</span>
          <span class="text" data-i18n-key="career_fact2"></span>
        </div>
        <div class="career-fact">
          <span class="number">&gt;11 600</span>
          <span class="text" data-i18n-key="career_fact3"></span>
        </div>
        <div class="career-fact">
          <span class="number">93</span>
          <span class="text" data-i18n-key="career_fact4"></span>
        </div>
        <div class="career-fact">
          <span class="number">Топ 6%</span>
          <span class="text" data-i18n-key="career_fact5"></span>
        </div>
      </div>
      <a href="https://jobs.stada.com" class="hero-btn" target="_blank" rel="noopener" data-i18n-key="career_button"></a>
    </div>
      </div>
  </section>

    <!-- Products call-to-action section -->
    <section class="products-section hero-products home-section" id="products">
    <div class="hero-products-container products-showcase">
      <div class="hero-products-text">
        <p class="hero-label" data-i18n-key="hero_products_label"></p>
        <h2 class="hero-heading" data-i18n-key="hero_products_heading"></h2>
        <p class="hero-description" data-i18n-key="hero_products_description"></p>
        <div class="products-highlights" aria-label="Product portfolio facts">
          <div class="products-highlight">
            <strong>9</strong>
            <span data-i18n-key="products_metric_portfolio"></span>
          </div>
          <div class="products-highlight">
            <strong>6</strong>
            <span data-i18n-key="products_metric_areas"></span>
          </div>
        </div>
        <a href="products/index.html" class="hero-btn" data-i18n-key="nav_products"></a>
      </div>
      <div class="hero-products-image">
        <div class="products-stage">
          <img src="assets/products/podium.png" alt="STADA products display">
        </div>
      </div>
    </div>
    <div class="home-section__inner product-preview-shell">
      <div class="product-preview-header">
        <p class="section-kicker" data-i18n-key="products_catalog_label"></p>
        <a href="products/index.html" data-i18n-key="products_browse_catalog"></a>
      </div>
      <div class="product-preview-grid">
        <a class="product-preview-card product-preview-card--cold" href="products/coldrex.html">
          <span class="product-preview-card__category" data-i18n-key="products_category_cold"></span>
          <img src="assets/products/Coldrex.png" alt="Coldrex">
          <span class="product-preview-card__name" data-i18n-key="product_coldrex_name"></span>
        </a>
        <a class="product-preview-card product-preview-card--digestive" href="products/enterogermina.html">
          <span class="product-preview-card__category" data-i18n-key="products_category_digestive"></span>
          <img src="assets/products/EnterogerminaNew.png" alt="Enterogermina">
          <span class="product-preview-card__name" data-i18n-key="product_enterogermina_name"></span>
        </a>
        <a class="product-preview-card product-preview-card--respiratory" href="products/sinulan-duo.html">
          <span class="product-preview-card__category" data-i18n-key="products_category_respiratory"></span>
          <img src="assets/products/Sinulan.png" alt="Sinulan Duo">
          <span class="product-preview-card__name" data-i18n-key="product_sinulan_duo_name"></span>
        </a>
        <a class="product-preview-card product-preview-card--immunity" href="products/vitrum-immunaktiv.html">
          <span class="product-preview-card__category" data-i18n-key="products_category_immunity"></span>
          <img src="assets/products/vitrum-immunaktiv/packshot-60-cropped.png" alt="Vitrum Immunaktiv">
          <span class="product-preview-card__name" data-i18n-key="product_vitrum_immunaktiv_name"></span>
        </a>
      </div>
    </div>
  </section>

  </main>

          <a href="#" class="footer-logo" aria-label="STADA logo">
            <img src="assets/logos/stada_logo.png" alt="STADA logo">
          </a>
          <p class="footer-eyebrow">STADA Kazakhstan</p>

          <div class="footer-trust" aria-label="STADA facts">

            <span data-i18n-key="footer_trust_countries"></span>
          </div>

        <nav class="footer-nav" aria-label="Footer navigation">
          <div class="footer-nav__group">
            <h3 data-i18n-key="footer_company_title"></h3>
            <a href="#about" data-i18n-key="nav_about"></a>
            <a href="history.html" data-i18n-key="nav_history"></a>

          </div>

            <h3 data-i18n-key="footer_products_title"></h3>
            <a href="products/index.html" data-i18n-key="products_browse_catalog"></a>
            <a href="products/coldrex.html" data-i18n-key="product_coldrex_name"></a>
            <a href="products/enterogermina.html" data-i18n-key="product_enterogermina_name"></a>
            <a href="products/vitrum-immunaktiv.html" data-i18n-key="product_vitrum_immunaktiv_name"></a>
          </div>
          <div class="footer-nav__group">

      <div class="footer-warning">
        <strong data-i18n-key="footer_warning_title"></strong>
        <p data-i18n-key="footer_warning_text"></p>
      </div>

      <div class="footer-bottom">
        <p>&copy; <span id="year"></span> STADA. <span data-i18n-key="footer_rights"></span></p>
        <div class="footer-bottom__links">
          <a href="https://www.stada.com" target="_blank" rel="noopener">stada.com</a>
          <a href="#" class="footer-top" data-i18n-key="footer_back_top" aria-label="Back to top"></a>
        </div>
      </div>
    </div>
  </footer>
